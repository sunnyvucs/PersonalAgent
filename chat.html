<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agent-SK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    header h1 span { color: #4f9eff; }

    .status {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #888;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
    }

    .status-dot.online { background: #4caf50; }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: #161616;
      border-bottom: 1px solid #222;
    }

    .controls label {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
    }

    .controls input {
      flex: 1;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: #e0e0e0;
      outline: none;
    }

    .controls input:focus { border-color: #4f9eff; }

    .controls button {
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #ccc;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .controls button:hover { background: #333; color: #fff; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .message.user .avatar { background: #4f9eff; color: #fff; }
    .message.agent .avatar { background: #2d2d2d; color: #aaa; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      max-width: calc(100% - 44px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #1a3a5c;
      border-bottom-right-radius: 4px;
      color: #ddeeff;
    }

    .message.agent .bubble {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
      color: #e0e0e0;
    }

    .thinking .bubble {
      color: #666;
      font-style: italic;
    }

    .thinking .dot-anim::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    .input-area {
      padding: 16px 20px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: #222;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      color: #e0e0e0;
      resize: none;
      outline: none;
      max-height: 140px;
      line-height: 1.5;
      font-family: inherit;
    }

    #user-input:focus { border-color: #4f9eff; }

    #send-btn {
      background: #4f9eff;
      border: none;
      border-radius: 10px;
      color: #fff;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #3a8de0; }
    #send-btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    .empty-state {
      margin: auto;
      text-align: center;
      color: #444;
    }

    .empty-state h2 { font-size: 22px; margin-bottom: 8px; color: #666; }
    .empty-state p { font-size: 14px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .suggestion {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
    }

    .suggestion:hover { border-color: #4f9eff; color: #fff; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>Agent<span>-SK</span></h1>
  <div class="status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connecting...</span>
  </div>
</header>

<div class="controls">
  <label>Working Dir:</label>
  <input type="text" id="working-dir" placeholder="e.g. D:/Projects/MyApp  (leave blank for unrestricted)" />
  <label>Session:</label>
  <input type="text" id="session-id" value="default" style="max-width:120px" />
  <button onclick="clearSession()">Clear Session</button>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <h2>Agent-SK</h2>
    <p>Your personal AI assistant. Ask it to read, write, or manage files.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="fillInput(this)">List files in my working dir</div>
      <div class="suggestion" onclick="fillInput(this)">Read the file notes.txt</div>
      <div class="suggestion" onclick="fillInput(this)">Create a file called todo.txt with today's tasks</div>
      <div class="suggestion" onclick="fillInput(this)">Summarize the contents of report.txt</div>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="user-input" rows="1" placeholder="Type your instruction..."></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  const API = "http://localhost:8000";

  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      if (r.ok) {
        document.getElementById("status-dot").classList.add("online");
        document.getElementById("status-text").textContent = "Agent-SK online";
      } else throw new Error();
    } catch {
      document.getElementById("status-text").textContent = "Server offline";
    }
  }

  checkHealth();

  const textarea = document.getElementById("user-input");
  textarea.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  textarea.addEventListener("input", () => {
    textarea.style.height = "auto";
    textarea.style.height = Math.min(textarea.scrollHeight, 140) + "px";
  });

  function fillInput(el) {
    textarea.value = el.textContent;
    textarea.focus();
  }

  function addMessage(role, text) {
    const empty = document.getElementById("empty-state");
    if (empty) empty.remove();

    const container = document.getElementById("messages");

    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "You" : "SK";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;

    return bubble;
  }

  function addThinking() {
    const empty = document.getElementById("empty-state");
    if (empty) empty.remove();

    const container = document.getElementById("messages");

    const wrap = document.createElement("div");
    wrap.className = "message agent thinking";
    wrap.id = "thinking-bubble";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "SK";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = 'Thinking<span class="dot-anim"></span>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById("thinking-bubble");
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if (!message) return;

    const workingDir = document.getElementById("working-dir").value.trim() || null;
    const sessionId = document.getElementById("session-id").value.trim() || "default";

    input.value = "";
    input.style.height = "auto";

    addMessage("user", message);
    addThinking();

    const btn = document.getElementById("send-btn");
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, working_dir: workingDir, session_id: sessionId }),
      });

      removeThinking();

      if (!res.ok) {
        const err = await res.json();
        addMessage("agent", `Error: ${err.detail || res.statusText}`);
      } else {
        const data = await res.json();
        addMessage("agent", data.response);
      }
    } catch (e) {
      removeThinking();
      addMessage("agent", "Could not reach Agent-SK server. Is start.bat running?");
    }

    btn.disabled = false;
    input.focus();
  }

  async function clearSession() {
    const sessionId = document.getElementById("session-id").value.trim() || "default";
    await fetch(`${API}/session/${sessionId}`, { method: "DELETE" });
    document.getElementById("messages").innerHTML = `
      <div class="empty-state" id="empty-state">
        <h2>Agent-SK</h2>
        <p>Session cleared. Start a new conversation.</p>
      </div>`;
  }
</script>
</body>
</html>
